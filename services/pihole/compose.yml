---
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "8053:80/tcp"
    environment:
      - TZ=America/Los_Angeles
      - FTLCONF_dns_listeningMode=ALL
      - FTLCONF_webserver_api_password
    volumes:
      - ./pihole-data/etc-pihole:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_NICE
